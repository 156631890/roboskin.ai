name: Quality gate

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "quality-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build with Next.js
        run: npm run build

      - name: Verify static export
        run: npm run verify:export

      - name: Upload verified static export
        uses: actions/upload-artifact@v4
        with:
          name: roboskin-static-export
          path: out
          retention-days: 7
